apiVersion: v1
kind: Service
metadata:
  name: mysql-service  # now my DB_HOST value is mysql-service in config-map
  namespace: skillpulse
spec:
  selector:
    app: mysql
  ports:
    - port: 3306

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: skillpulse
spec:
  selector:
    app: backend
  ports:
    - port: 8080
    
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: skillpulse
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80   #desired port//cluster port //access the outer world
      targetPort: 80   #application running port in pod //container port //pod port


      
