apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: skillpulse
  labels:
    app: backend

spec:
  replicas: 3

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: trainwithshubham/skillpulse-backend:latest

        ports:
        - containerPort: 8080

        envFrom:
        - configMapRef:
            name: backend-cm
        - secretRef:
            name: secret-backend

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3